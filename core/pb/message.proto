syntax = "proto3";

package pb;

option go_package = "pneumamesh-core/pb";

message User {
  string id = 1;
  string name = 2;
  int64 register_timestamp = 3;
}

message ChatMessage {
  User sender = 1;
  string text = 2;
  int64 timestamp = 3;
}

message FullState {
  User user = 1;
  string current_room = 2;
  string network = 3;
  string wifi_ssid = 4;
  string wifi_bssid = 5;
}

message DiscoveryPacket {
  string network_name = 1;
  string peer_id = 2;
  repeated string addrs = 3;
}