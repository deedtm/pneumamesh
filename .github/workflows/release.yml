name: Build and Release PneumaMesh

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'

      - name: Install dependencies
        run: flutter pub get
        working-directory: ui

      - name: Build APK (Android)
        run: flutter build apk --release
        working-directory: ui

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/pneumamesh-${{ github.ref_name }}.apk
        working-directory: ui

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pneumamesh-${{ github.ref_name }}.apk
          path: ui/build/app/outputs/flutter-apk/pneumamesh-${{ github.ref_name }}.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'

      - name: Install dependencies
        run: flutter pub get
        working-directory: ui

      - name: Build Windows app
        run: flutter build windows --release
        working-directory: ui

      - name: Rename EXE
        run: Rename-Item -Path "build/windows/runner/Release/PneumaMesh.exe" -NewName "pneumamesh-${{ github.ref_name }}.exe"
        shell: pwsh
        working-directory: ui

      - name: Upload Windows EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: pneumamesh-${{ github.ref_name }}.exe
          path: ui/build/windows/runner/Release/pneumamesh-${{ github.ref_name }}.exe
          working-directory: ui

  release:
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: pneumamesh-${{ github.ref_name }}.apk
          path: .
      - name: Download Windows EXE artifact
        uses: actions/download-artifact@v4
        with:
          name: pneumamesh-${{ github.ref_name }}.exe
          path: .
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pneumamesh-${{ github.ref_name }}.apk
            pneumamesh-${{ github.ref_name }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
