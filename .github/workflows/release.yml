name: Build and Release PneumaMesh

on:
  push:
    tags:
      - 'v*.*.*'

# Даем права на создание релизов
permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'

      - name: Install dependencies
        run: flutter pub get
        working-directory: ui

      - name: Build APK (Android)
        run: flutter build apk --release
        working-directory: ui

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/pneumamesh-${{ github.ref_name }}.apk
        working-directory: ui

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ui/build/app/outputs/flutter-apk/pneumamesh-${{ github.ref_name }}.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'

      - name: Install dependencies
        run: flutter pub get
        working-directory: ui

      - name: Build Windows app
        run: flutter build windows --release
        working-directory: ui

      - name: Zip Windows Release
        shell: pwsh
        working-directory: ui
        run: |
          # Находим папку Release (обычно в build/windows/x64/runner/Release)
          $releasePath = Get-ChildItem -Path "build/windows" -Recurse -Directory | Where-Object { $_.Name -eq "Release" -and $_.FullName -match "runner" } | Select-Object -First 1
          if (-not $releasePath) {
            Write-Error "Release directory not found"
            exit 1
          }
          Write-Host "Zipping content from: $($releasePath.FullName)"
          # Архивируем всё содержимое папки (exe, dll, data)
          Compress-Archive -Path "$($releasePath.FullName)\*" -DestinationPath "pneumamesh-${{ github.ref_name }}-windows.zip"

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: ui/pneumamesh-${{ github.ref_name }}-windows.zip

  release:
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}