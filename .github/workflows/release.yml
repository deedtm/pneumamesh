name: Build and Release PneumaMesh

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'

      - name: Install dependencies
        run: flutter pub get
        working-directory: ui

      - name: Build APK (Android)
        run: flutter build apk --release
        working-directory: ui

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/pneumamesh-${{ github.ref_name }}.apk
        working-directory: ui

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ui/build/app/outputs/flutter-apk/pneumamesh-${{ github.ref_name }}.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'

      - name: Install dependencies
        run: flutter pub get
        working-directory: ui

      - name: Build Windows app
        run: flutter build windows --release
        working-directory: ui

      - name: Rename EXE
        shell: pwsh
        working-directory: ui
        run: |
          $exe = Get-ChildItem -Path "build/windows" -Filter "*.exe" -Recurse | Where-Object { $_.FullName -match "Release" } | Select-Object -First 1
          if (-not $exe) { 
            Write-Error "exe not found in build directory"
            exit 1 
          }
          Rename-Item -Path $exe.FullName -NewName "pneumamesh-${{ github.ref_name }}.exe"

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: ui/build/windows/**/pneumamesh-${{ github.ref_name }}.exe

  release:
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}